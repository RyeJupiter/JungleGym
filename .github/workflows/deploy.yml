name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Build & Deploy to Cloudflare Workers
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Download static assets
        run: |
          curl -L -A "Mozilla/5.0" \
            "https://upload.wikimedia.org/wikipedia/commons/thumb/a/a9/CagedTamarin.jpg/400px-CagedTamarin.jpg" \
            -o apps/web/public/emperor-tamarin.jpg
          file apps/web/public/emperor-tamarin.jpg

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Clear Next.js cache
        run: rm -rf apps/web/.next

      - name: Build for Cloudflare
        run: npm run build:cloudflare --workspace=@junglegym/web
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_SITE_URL: https://junglegym.academy
          NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY }}
          # Server-side secrets (SUPABASE_SERVICE_ROLE_KEY, STRIPE_SECRET_KEY) are
          # set via `wrangler secret put` — they're injected at Worker runtime,
          # not needed at build time.

      - name: Deploy with Wrangler
        run: |
          cd apps/web
          npx wrangler deploy 2>&1 | tee /tmp/wrangler-output.txt
          exit ${PIPESTATUS[0]}
        env:
          CLOUDFLARE_API_KEY: ${{ secrets.CLOUDFLARE_API_KEY }}
          CLOUDFLARE_EMAIL: ${{ secrets.CLOUDFLARE_EMAIL }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Show wrangler output on failure
        if: failure()
        run: cat /tmp/wrangler-output.txt || echo "No output captured"
